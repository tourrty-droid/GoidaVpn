name: Hourly Auto Update Configs

on:
  schedule:
    - cron: '0 * * * *'
  push:
    branches:
      - main
  workflow_dispatch:
  repository_dispatch:
    types: [remote_trigger]

jobs:
  update-configs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Клонирование репозитория
      uses: actions/checkout@v4

    - name: Настройка Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Установка библиотек
      run: pip install requests

    - name: Выполнение скрипта
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python merge_configs.py

    - name: Сохранение изменений
      run: |
        git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        if [ -d "data" ]; then git add data/; fi
        if [ -d "logs" ]; then git add logs/; fi
        
        if ! git diff --staged --quiet; then
          git commit -m "🚀 Автоматическое обновление (1 час)"
          git push
        else
          echo "Изменений нет."
        fi
        
