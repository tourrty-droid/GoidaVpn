name: Автообновление VLESS и Trojan (каждые 15 минут)

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  update_configs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Обновление VLESS конфигов (из двух источников)
        run: |
          # Создаём временный файл для сбора всех VLESS-ссылок
          mkdir -p data/Githubmirror/vless/
          touch all_vless_temp.txt

          # Скачиваем первый источник и добавляем в общий файл
          echo "# Source 1: github.com/kort0881" >> all_vless_temp.txt
          curl -s https://raw.githubusercontent.com/kort0881/vpn-vless-configs-russia/main/data/githubmirror/clean/vless.txt >> all_vless_temp.txt

          # Добавляем разделитель для наглядности
          echo "" >> all_vless_temp.txt
          echo "# Source 2: github.com/igareck (White Lists)" >> all_vless_temp.txt

          # Скачиваем второй источник и добавляем в общий файл
          # Используем grep, чтобы отфильтровать только строки, начинающиеся на vless://
          curl -s https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile-2.txt | grep '^vless://' >> all_vless_temp.txt

          # Удаляем возможные пустые строки и сохраняем финальный файл
          sed -i '/^$/d' all_vless_temp.txt
          mv all_vless_temp.txt data/Githubmirror/vless/vless.txt

          echo "✅ VLESS обновлен. Количество строк: $(wc -l < data/Githubmirror/vless/vless.txt)"

      - name: Обновление Trojan конфигов
        run: |
          mkdir -p data/Githubmirror/trojan/
          curl -s -o data/Githubmirror/trojan/trojan.txt \
            https://raw.githubusercontent.com/kort0881/vpn-vless-configs-russia/main/data/githubmirror/clean/trojan.txt
          echo "✅ Trojan обновлен. Размер: $(wc -c < data/Githubmirror/trojan/trojan.txt) байт"

      - name: Отправка изменений в репозиторий
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add -A
          if git diff --cached --quiet; then
            echo "Нет изменений"
          else
            git commit -m "🔄 Auto-update: VLESS (2 sources) & Trojan ($(date '+%Y-%m-%d %H:%M:%S'))"
            git push
            echo "✅ Обновлено"
          end 
