name: Автообновление VLESS и Trojan (каждые 15 минут)

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  update_configs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Обновление VLESS конфигов
        run: |
          mkdir -p data/Githubmirror/vless/
          curl -s -o data/Githubmirror/vless/vless.txt \
            https://raw.githubusercontent.com/kort0881/vpn-vless-configs-russia/main/data/githubmirror/clean/vless.txt
          echo "VLESS обновлен"

      - name: Обновление Trojan конфигов
        run: |
          mkdir -p data/Githubmirror/trojan/
          curl -s -o data/Githubmirror/trojan/trojan.txt \
            https://raw.githubusercontent.com/kort0881/vpn-vless-configs-russia/main/data/githubmirror/clean/trojan.txt
          echo "Trojan обновлен"

      - name: Отправка изменений
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add -A
          if git diff --cached --quiet; then
            echo "Нет изменений"
          else
            git commit -m "Auto-update: $(date '+%Y-%m-%d %H:%M:%S')"
            git push
            echo "✅ Обновлено"
          fi
