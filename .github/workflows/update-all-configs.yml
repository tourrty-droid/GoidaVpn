name: Автообновление VLESS и Trojan (каждые 2 часа)

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  update_configs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Подготовка структуры (удаление файлов-помех)
        run: |
          # Если есть файл Vless — удаляем
          if [ -f "data/Githubmirror/Vless" ]; then
            rm -f data/Githubmirror/Vless
            echo "Удалён файл-помеха data/Githubmirror/Vless"
          fi
          # Если есть файл trojan — удаляем
          if [ -f "data/Githubmirror/trojan" ]; then
            rm -f data/Githubmirror/trojan
            echo "Удалён файл-помеха data/Githubmirror/trojan"
          fi
          # Создаём чистые директории
          mkdir -p data/Githubmirror/Vless/
          mkdir -p data/Githubmirror/trojan/

      - name: Полная замена VLESS конфигов (из двух источников)
        run: |
          # Полностью перезаписываем файл новыми конфигами
          echo "# Source 1: github.com/kort0881" > data/Githubmirror/Vless/vless.txt
          curl -s https://raw.githubusercontent.com/kort0881/vpn-vless-configs-russia/main/data/githubmirror/clean/vless.txt >> data/Githubmirror/Vless/vless.txt
          
          echo "" >> data/Githubmirror/Vless/vless.txt
          echo "# Source 2: github.com/igareck (White Lists)" >> data/Githubmirror/Vless/vless.txt
          curl -s https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile-2.txt | grep '^vless://' >> data/Githubmirror/Vless/vless.txt
          
          echo "✅ VLESS обновлен. Строк: $(wc -l < data/Githubmirror/Vless/vless.txt)"

      - name: Полная замена Trojan конфигов
        run: |
          curl -s -o data/Githubmirror/trojan/trojan.txt \
            https://raw.githubusercontent.com/kort0881/vpn-vless-configs-russia/main/data/githubmirror/clean/trojan.txt
          echo "✅ Trojan обновлен. Размер: $(wc -c < data/Githubmirror/trojan/trojan.txt) байт"

      - name: Принудительный коммит и пуш
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add -A
          git commit -m "🔄 Force update: VLESS & Trojan ($(date '+%Y-%m-%d %H:%M:%S'))"
          git push
          echo "✅ Новые конфиги записаны и отправлены"
